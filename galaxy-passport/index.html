  await sleep(3800); if(!Scene.alive(my))return;
  $("unfold").classList.remove("show","auto");
  Scene.go("cinematic");
};

/* ---- UNFOLD WAIT ---- */
SCN.unfoldwait=async(my)=>{ frame("stage"); $("unfold").classList.add("show");
  await say("자, 여행자. 게이트를 열어줘— Galaxy를 활짝 펼치는 거야!");
  let nudges=0;
  (async function n(){ while(Scene.alive(my)&&nudges<2){ await sleep(12000);
    if(!Scene.alive(my))break; nudges++; await say("펼치면— 바로 이륙이야!"); } })();
};
SCN.unfoldwait_posture=(s)=>{ if(s==="wide"){ $("unfold").classList.remove("show"); Scene.go("cinematic"); } };
$("unfold-dev").onclick=()=>{ $("unfold").classList.remove("show"); Scene.go("cinematic"); };

/* ---- CINEMATIC (wide) ---- */
SCN.cinematic=async(my)=>{ Fold.allowWide(true);
  document.body.classList.remove("phase-fold"); document.body.classList.add("phase-unfold"); Fold.sizePassport();  // THE UNFOLD: graphics can use both halves; passport back to full size
  frame("stage"); const d=Store.dest;
  $("warp").classList.remove("show","slow","fast"); $("count").classList.remove("show");
  // LANDING explosion — stars + glitter burst
  const bw=stage.getBoundingClientRect().width, bh=stage.getBoundingClientRect().height;
  Sfx.thunk(); Sfx.sparkle();
  FX.emit(bw/2,bh/2,{count:120,speed:10,decay:.01,size:3,col:"255,255,255"});
  FX.emit(bw/2,bh/2,{count:70,speed:7,decay:.012,size:4,col:"255,225,150"});
  FX.emit(bw/2,bh/2,{count:60,speed:6,decay:.012,size:3,col:"200,180,255"});
  // unfold unlocks Wide Mode; cinematic scene
  $("cine-scene").style.background=d.image
    ? `center / cover no-repeat url("${d.image}")`
    : d.world.replace("circle at 40% 30%","120% 60% at 50% 40%");
  $("cine-layer").style.background=`repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 2px, transparent 2px 40px)`;
  $("cine-name").textContent=d.name;
  $("cine").classList.add("show");
  await sleep(900); if(!Scene.alive(my))return;
  await say(d.arrive); if(!Scene.alive(my))return;
  await sleep(2600); if(!Scene.alive(my))return;
  await say(`${d.name}, 정말 근사하지 않아?`);
  await sleep(1500); if(!Scene.alive(my))return;   // total ≈ 5.5s widescreen moment
  $("cine").classList.remove("show");
  Scene.go("selfie2invite");
};
SCN.cinematic_posture=(s)=>{ if(s==="fold"){ say("어어, 문이 닫혔어! 다시 펼쳐줘~",{replace:true}); } };

/* ---- SELFIE 2 INVITE ---- */
SCN.selfie2invite=async(my)=>{ frame("stage"); const d=Store.dest;
  document.body.classList.add("pp-split"); Fold.sizePassport();
  $("pp-dest").textContent=d.name+" "+d.emblem;
  const pp=$("passport"); pp.classList.add("show","open","float");   // passport floats on the LEFT — fills the empty space
  await say("도착~! 기념사진 없이 돌아갈 순 없지."); if(!Scene.alive(my))return;
  say(`${d.name} 여행자로 변신시켜줄게. 준비됐어?`);
  const p=document.createElement("div");p.className="panel";
  const b=bubble('<span class="ico">📸</span> 변신하고 찍기','primary pulse');
  b.onclick=()=>Scene.go("camera2"); p.appendChild(b);$("scene").appendChild(p);
};

/* ---- CAMERA 2 (fullscreen filter) ---- */
SCN.camera2=async(my)=>{ const d=Store.dest;
  say(`${d.name} 필터를 적용했어. 넓은 화면 가득, 여유롭게 한 장 담아보자.`);
  Cam.open({titleTxt:`${d.name} 와이드 셀피`,subTxt:`${d.name} 필터 · 넓은 배경까지 담아봐 ✨`,
    wide:true, filterTheme:{filter:d.filter,tint:d.tint,emblem:d.emblem},
    done:(url)=>{ if(url)Store.selfie2=url; Scene.go("celebrate2"); }});
};

/* ---- CELEBRATE 2 ---- */
SCN.celebrate2=async(my)=>{ frame("stage"); const d=Store.dest; const pp=$("passport");
  if(Store.selfie2){ $("pp-photo2").style.backgroundImage=`url(${Store.selfie2})`; $("pp-photo2").style.display="block"; }
  $("pp-dest").textContent=d.name+" "+d.emblem;
  $("pp-meta").textContent="여행 완료 · "+Store.date;
  document.body.classList.add("pp-split");                 // passport → left 1/4, guide → right 3/4 (this beat only)
  pp.classList.add("show","open","float"); await sleep(700); if(!Scene.alive(my))return;
  $("pp-stamp2").classList.add("show"); FX.shake(6,180); Sfx.rumble(); Sfx.sparkle();
  // confetti
  const w=stage.getBoundingClientRect().width;
  for(let i=0;i<5;i++){FX.emit(w*Math.random(),40,{count:16,speed:5,lift:-2,decay:.012,
    col:["255,120,90","90,208,160","120,150,255","255,215,122"][i%4]});await sleep(60);}
  await say(`와, 해냈어. ${d.name}까지 갔다 온 여행자, 바로 너야.`); if(!Scene.alive(my))return;
  await sleep(700); if(!Scene.alive(my))return;
  // passport stays floating right through this line — no hide/reappear ceremony, straight into the final reveal
  await say("이제 너만의 증명서를 만들어줄게! 완성되면 QR 코드를 저장하거나 사진을 찍어서 직원에게 보여줘 — 작은 증정 상품이 기다리고 있어 🎁"); if(!Scene.alive(my))return;
  await sleep(500); if(!Scene.alive(my))return;
  document.body.classList.remove("pp-split");
  Scene.go("reward");
};

/* ---- REWARD (final collectible + nickname + QR + save) ---- */
SCN.reward=async(my)=>{ frame("stage"); const d=Store.dest;
  // the floating passport (still up from celebrate2) is done being useful now — hide it explicitly rather than
  // trusting it stays covered, since its own "서울 🏙️" destination label could bleed through while the big
  // template image is still loading and .final-card hasn't finished painting an opaque background yet.
  document.body.classList.remove("pp-split"); $("passport").classList.remove("show","open","float","tocam");
  const f=$("final"); f.innerHTML="";
  const card=document.createElement("div"); card.className="final-card";
  card.style.backgroundImage=`url(${d.image})`;   // the destination's own template artwork IS the design now
  const qid="qr"+Date.now(); const initNick = Store.nickname==="이름 모를 여행자" ? "" : Store.nickname;
  card.innerHTML=`
    <div class="fc-photo" style="background-image:url(${Store.selfie2||Store.selfie1||""})"></div>
    <div class="fc-nick-mask" style="background:${d.paperBg}"></div>
    <div class="fc-nick" id="fc-nick" contenteditable="true" style="color:${d.nameColor}">${initNick}</div>
    <div class="fc-qr"><canvas id="${qid}" width="132" height="132"></canvas></div>`;
  const done=document.createElement("button"); done.className="stampbtn fc-done"; done.textContent="미션 끝 ✦";
  card.appendChild(done);   // sits ON the paper (bottom-centre), never in a cut-off row below
  f.appendChild(card);
  f.classList.add("show");
  drawQR($(qid),Math.floor(performance.now()));
  await say("나만의 갤럭시 여권 완성! 이름을 눌러서 직접 적어봐."); if(!Scene.alive(my))return;
  await say("저장은 걱정 마— QR 코드를 스캔하거나, 사진으로 찰칵 남기면 돼!");
  const nk=$("fc-nick");
  nk.addEventListener("input",()=>{ const v=nk.textContent.trim(); Store.nickname=v||"이름 모를 여행자"; });
  // exit passport → stay in WIDE mode until the device is folded back (Feature 2)
  done.onclick=()=>{ stopStayTimer(); f.classList.remove("show"); Scene.go("foldback"); };
  startStayTimer(my); // passport-mode idle: 45s → 20s countdown → home
};

/* ---- FOLD-BACK: stay wide → invite conversation → after idle, ask to fold ---- */
SCN.foldback=async(my)=>{ frame("stage");
  stopStayTimer();
  wipe(); $("passport").classList.remove("show","tocam","open","float"); $("final").classList.remove("show"); document.body.classList.remove("pp-split");
  await say("오늘 정말 멋진 여행이었어— 즐거웠어, 여행자!"); if(!Scene.alive(my))return;
  await say("다음 여행자를 위해, 이제 H8을 접어줘. 접으면 처음 화면으로 돌아갈게!"); if(!Scene.alive(my))return;
  $("foldback").classList.add("show");   // show the "접어주세요" fold-back graphic — wait until it's folded
  // ONCE FOLDED → home. (real device: physical fold; here: tap the graphic, or the dev button)
  $("foldback").onclick=(e)=>{ if(e.target.id==="foldback-dev")return; $("foldback").classList.remove("show"); $("foldback").onclick=null; doReset(); };
};
SCN.foldback_posture=(s)=>{ if(s==="fold"){ $("foldback").classList.remove("show"); $("foldback").onclick=null; doReset(); } };
$("foldback-dev").onclick=()=>{ $("foldback").classList.remove("show"); $("foldback").onclick=null; doReset(); };

/* ---- helpers ---- */
function roundRect(x,rx,ry,rw,rh,r){x.beginPath();x.moveTo(rx+r,ry);x.arcTo(rx+rw,ry,rx+rw,ry+rh,r);
  x.arcTo(rx+rw,ry+rh,rx,ry+rh,r);x.arcTo(rx,ry+rh,rx,ry,r);x.arcTo(rx,ry,rx+rw,ry,r);x.closePath();}
const loadImg=src=>new Promise(res=>{if(!src){res(null);return;}const im=new Image();im.onload=()=>res(im);im.onerror=()=>res(null);im.src=src;});
function coverDraw(x,im,dx,dy,dw,dh){const ar=im.width/im.height,tr=dw/dh;let sw=im.width,sh=im.height,sx=0,sy=0;
  if(ar>tr){sw=im.height*tr;sx=(im.width-sw)/2;}else{sh=im.width/tr;sy=(im.height-sh)/2;}x.drawImage(im,sx,sy,sw,sh,dx,dy,dw,dh);}

/* ---- 4K WIDE passport export (§0-Q): pfp+name header, wide selfie2 below ---- */
async function exportPassport(d){
  const W=3840,H=2160,HDR=560,c=document.createElement("canvas");c.width=W;c.height=H;const x=c.getContext("2d");
  const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,"#1b3e7a");g.addColorStop(.6,"#0e2350");g.addColorStop(1,"#0a1a3f");
  x.fillStyle=g;x.fillRect(0,0,W,H);
  // body: wide selfie2 fills below header
  const s2=await loadImg(Store.selfie2);
  if(s2)coverDraw(x,s2,0,HDR,W,H-HDR); else {x.fillStyle="#0a1530";x.fillRect(0,HDR,W,H-HDR);}
  // header band
  x.fillStyle="rgba(14,35,80,.9)";x.fillRect(0,0,W,HDR);
  x.fillStyle="#ffd77a";x.fillRect(0,HDR-8,W,8);
  // round pfp (selfie1)
  const s1=await loadImg(Store.selfie1),px=120,py=110,ps=340;
  x.save();roundRect(x,px,py,ps,ps,60);x.clip();
  if(s1)coverDraw(x,s1,px,py,ps,ps); else {x.fillStyle="#123";x.fillRect(px,py,ps,ps);} x.restore();
  x.strokeStyle="#ffd77a";x.lineWidth=12;roundRect(x,px,py,ps,ps,60);x.stroke();
  // header text
  const tx=px+ps+64;
  x.fillStyle="#ffd77a";x.font="bold 44px sans-serif";x.fillText("GALAXY PASSPORT",tx,205);
  x.fillStyle="#fff";x.font="900 108px sans-serif";x.fillText(Store.nickname,tx,330);
  x.fillStyle="#a9b8d6";x.font="46px sans-serif";x.fillText(Store.serial+" · 여행 완료 "+Store.date,tx,415);
  x.font="150px serif";x.fillText(d.emblem,W-320,340);
  // ribbon
  x.fillStyle="#ffd77a";x.fillRect(0,HDR+50,1040,120);x.fillStyle="#3a2a00";x.font="bold 62px sans-serif";
  x.fillText("TRAVEL COMPLETE · "+d.name,50,HDR+130);
  // ARRIVAL stamp on the wide selfie
  x.save();x.translate(W-620,HDR+340);x.rotate(-0.16);x.strokeStyle="#5ad0a0";x.fillStyle="#5ad0a0";x.lineWidth=14;
  roundRect(x,-230,-90,460,180,24);x.stroke();x.font="bold 100px sans-serif";x.fillText("ARRIVAL ✦",-210,35);x.restore();
  // world emblem stamp (kept clear of the QR zone bottom-right)
  x.save();x.translate(W-380,H-780);x.rotate(0.15);x.font="240px serif";x.fillText(d.emblem,-120,90);x.restore();
  // QR + staff + serial
  const qc=document.createElement("canvas");qc.width=qc.height=360;drawQR(qc,777);x.drawImage(qc,W-440,H-440,360,360);
  x.strokeStyle="rgba(255,255,255,.6)";x.setLineDash([18,14]);x.lineWidth=6;x.beginPath();x.arc(210,H-210,120,0,6.28);x.stroke();x.setLineDash([]);
  x.fillStyle="#eee";x.font="40px sans-serif";x.fillText("STAFF ✓",135,H-200);
  const url=c.toDataURL("image/png");
  const a=document.createElement("a");a.href=url;a.download=`GalaxyPassport_${Store.nickname}_${d.name}.png`;a.click();
  say("저장했어! 4K 와이드 여권, 그대로야. 직원에게 보여줘!",{replace:true});
}

/* ============================================================
   BOOT SEQUENCE
   ============================================================ */
(async function init(){
  document.body.classList.toggle("cam-guide", CFG.camGuide);
  Fold.apply();
  try{
    const opt={sdk_key:CFG.sdkKey,avatar_id:CFG.avatarId,log_level:"warn",language:"ko_kr"};
    if(CFG.adlp)opt.execution_type="adlp_worker";
    await SDK.init(opt);
  }catch(e){ $("splash-tag").textContent="연결 실패: "+e.message; return; }
  watchAvatarSize();   // detect the stream's native size → match the frame to it (no crop)
  Scene.go("boot");
})();
window.addEventListener("beforeunload",()=>{try{SDK.destroy();}catch(e){}});
</script>
